# ─────────────────────────────────────────────────────────
# LAS FMS — Nginx Server Block
# Ganti las-fms.yourdomain.com dengan domain Anda
# ─────────────────────────────────────────────────────────

upstream las_api {
  server api:3001;
  keepalive 32;
}

# HTTP → HTTPS redirect
server {
  listen 80;
  server_name las-fms.yourdomain.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS
server {
  listen 443 ssl http2;
  server_name las-fms.yourdomain.com;

  ssl_certificate     /etc/letsencrypt/live/las-fms.yourdomain.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/las-fms.yourdomain.com/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_session_cache   shared:SSL:10m;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Frontend (static files)
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # API proxy
  location /api/ {
    limit_req zone=api burst=20 nodelay;
    proxy_pass         http://las_api;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection 'upgrade';
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 60s;
  }

  # Auth rate limit
  location /api/auth/login {
    limit_req zone=auth burst=5 nodelay;
    proxy_pass http://las_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Static uploads
  location /uploads/ {
    alias /usr/share/nginx/uploads/;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # Health check (no logs)
  location /api/health {
    proxy_pass http://las_api;
    access_log off;
  }
}
